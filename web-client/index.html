<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yam's Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading screen -->
    <div id="loading-screen">
        <div class="loader-content">
            <h1 class="loader-title">YAM'S CASINO</h1>
            <div class="loader-bar"><div class="loader-fill"></div></div>
            <p class="loader-text">Préparation de la table...</p>
        </div>
    </div>

    <!-- Main 3D canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <!-- Top bar -->
        <div id="top-bar">
            <!-- Player score badge (left) -->
            <div class="score-badge player-badge">
                <div class="badge-icon">♠</div>
                <div class="badge-info">
                    <span class="badge-label">VOUS</span>
                    <span id="player-score" class="badge-score">0</span>
                </div>
                <div id="player-timer-ring" class="timer-ring">
                    <svg viewBox="0 0 40 40">
                        <circle class="timer-bg" cx="20" cy="20" r="18"/>
                        <circle id="player-timer-circle" class="timer-fg" cx="20" cy="20" r="18"/>
                    </svg>
                    <span id="player-timer-text" class="timer-text">--</span>
                </div>
            </div>

            <!-- Center turn indicator -->
            <div id="round-info">
                <div id="turn-indicator">EN ATTENTE</div>
                <div id="roll-counter">LANCE 0/3</div>
            </div>

            <!-- Opponent score badge (right) -->
            <div class="score-badge opponent-badge">
                <div id="opponent-timer-ring" class="timer-ring">
                    <svg viewBox="0 0 40 40">
                        <circle class="timer-bg" cx="20" cy="20" r="18"/>
                        <circle id="opponent-timer-circle" class="timer-fg" cx="20" cy="20" r="18"/>
                    </svg>
                    <span id="opponent-timer-text" class="timer-text">--</span>
                </div>
                <div class="badge-info">
                    <span class="badge-label">ADVERSAIRE</span>
                    <span id="opponent-score" class="badge-score">0</span>
                </div>
                <div class="badge-icon">♦</div>
            </div>
        </div>

        <!-- Combination choices bar -->
        <div id="choices-bar" class="hidden">
            <div id="choices-container"></div>
        </div>

        <!-- Left score panel -->
        <div id="left-panel" class="score-panel">
            <div class="panel-header">VOUS</div>
            <div id="player-grid" class="score-grid"></div>
        </div>

        <!-- Right score panel -->
        <div id="right-panel" class="score-panel">
            <div class="panel-header">ADVERSAIRE</div>
            <div id="opponent-grid" class="score-grid"></div>
        </div>

        <!-- Bottom action buttons -->
        <div id="action-bar">
            <button id="btn-roll" class="action-btn" disabled>
                <span class="btn-icon">🎲</span>
                <span class="btn-text">LANCER</span>
            </button>
            <button id="btn-validate" class="action-btn validate-btn hidden" disabled>
                <span class="btn-icon">✓</span>
                <span class="btn-text">VALIDER</span>
            </button>
        </div>

        <!-- Queue/Connection overlay -->
        <div id="queue-overlay">
            <div class="queue-content">
                <h2>YAM'S CASINO</h2>
                <p id="connection-status">Connexion au serveur...</p>
                <button id="btn-join-queue" class="queue-btn" disabled>REJOINDRE LA PARTIE</button>
                <button id="btn-leave-queue" class="queue-btn danger hidden">QUITTER LA FILE</button>
                <p id="queue-status" class="hidden">En attente d'un adversaire...</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- Scene -->
    <script src="js/components/scene/scene.lighting.js"></script>
    <script src="js/components/scene/scene.room.js"></script>
    <script src="js/components/scene/scene.props.js"></script>
    <script src="js/components/scene/scene.js"></script>
    <!-- Table -->
    <script src="js/components/table/table.config.js"></script>
    <script src="js/components/table/table.geometry.js"></script>
    <script src="js/components/table/table.glass.js"></script>
    <script src="js/components/table/table.js"></script>
    <!-- Dice -->
    <script src="js/components/dice/dice.config.js"></script>
    <script src="js/components/dice/dice.texture.js"></script>
    <script src="js/components/dice/dice.geometry.js"></script>
    <script src="js/components/dice/dice.js"></script>
    <!-- Chips -->
    <script src="js/components/chips/chip.model.js"></script>
    <script src="js/components/chips/chips.js"></script>
    <!-- Dice Cup -->
    <script src="js/components/dice-cup/cup.model.js"></script>
    <script src="js/components/dice-cup/dice-cup.js"></script>
    <!-- Services -->
    <script src="js/services/ui.js"></script>
    <script src="js/services/animations.js"></script>
    <!-- Socket -->
    <script src="js/contexts/socket-client.js"></script>
    <!-- Controllers -->
    <script src="js/controllers/socket-handlers.js"></script>
    <script src="js/controllers/ui-handlers.js"></script>
    <script src="js/controllers/game-state.js"></script>
    <!-- Entry point -->
    <script src="js/main.js"></script>
</body>
</html>
