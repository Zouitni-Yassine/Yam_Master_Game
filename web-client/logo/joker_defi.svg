<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <!-- Card background gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="40%" stop-color="#faedc4"/>
      <stop offset="100%" stop-color="#f0d890"/>
    </linearGradient>
    <!-- Gold metallic gradient -->
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff0a0"/>
      <stop offset="25%" stop-color="#d4a843"/>
      <stop offset="50%" stop-color="#f5d060"/>
      <stop offset="75%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#f5d060"/>
    </linearGradient>
    <!-- Purple jester gradient -->
    <linearGradient id="jesterPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#6c3483"/>
    </linearGradient>
    <!-- Red gradient -->
    <linearGradient id="jesterRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#a93226"/>
    </linearGradient>
    <!-- Face skin -->
    <radialGradient id="skinGrad" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#fde8c8"/>
      <stop offset="100%" stop-color="#f0c090"/>
    </radialGradient>
    <!-- Card shadow -->
    <filter id="cardShadow" x="-5%" y="-3%" width="115%" height="115%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#00000055"/>
    </filter>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Hat pattern -->
    <pattern id="dotPattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.2" fill="#b8860b" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Card base with shadow -->
  <g filter="url(#cardShadow)">
    <rect x="10" y="10" width="380" height="540" rx="24" fill="url(#cardBg)"/>
  </g>

  <!-- Card border double line -->
  <rect x="10" y="10" width="380" height="540" rx="24" fill="none" stroke="url(#goldMetal)" stroke-width="4"/>
  <rect x="20" y="20" width="360" height="520" rx="18" fill="none" stroke="url(#goldMetal)" stroke-width="1.5" opacity="0.7"/>

  <!-- Inner decorative border -->
  <rect x="28" y="28" width="344" height="504" rx="14" fill="none" stroke="#d4a843" stroke-width="0.8" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- Corner dot pattern overlay -->
  <rect x="10" y="10" width="380" height="540" rx="24" fill="url(#dotPattern)" opacity="0.3"/>

  <!-- TOP LEFT corner — J + star -->
  <text x="36" y="66" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#1a0a2e" font-style="italic">J</text>
  <text x="34" y="90" font-family="Georgia, serif" font-size="18" fill="#9b59b6">★</text>

  <!-- BOTTOM RIGHT corner — rotated J + star -->
  <g transform="rotate(180, 200, 280)">
    <text x="36" y="66" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#1a0a2e" font-style="italic">J</text>
    <text x="34" y="90" font-family="Georgia, serif" font-size="18" fill="#9b59b6">★</text>
  </g>

  <!-- ═══ JESTER HAT ═══ -->
  <!-- Hat brim -->
  <ellipse cx="200" cy="148" rx="82" ry="18" fill="#1a0a2e"/>
  <ellipse cx="200" cy="146" rx="80" ry="14" fill="#2d1b4e"/>

  <!-- Left bell tip -->
  <path d="M120 148 C100 130 85 100 95 72 C100 56 115 48 128 52 C118 70 116 95 125 115 Z" fill="url(#jesterRed)"/>
  <ellipse cx="105" cy="66" rx="14" ry="14" fill="url(#goldMetal)" filter="url(#glow)"/>
  <ellipse cx="105" cy="66" rx="6" ry="6" fill="#fff8dc"/>

  <!-- Right bell tip -->
  <path d="M280 148 C300 130 315 100 305 72 C300 56 285 48 272 52 C282 70 284 95 275 115 Z" fill="url(#jesterPurple)"/>
  <ellipse cx="295" cy="66" rx="14" ry="14" fill="url(#goldMetal)" filter="url(#glow)"/>
  <ellipse cx="295" cy="66" rx="6" ry="6" fill="#fff8dc"/>

  <!-- Center hat peak -->
  <path d="M162 148 C155 120 158 88 178 62 C185 52 195 44 200 40 C205 44 215 52 222 62 C242 88 245 120 238 148 Z" fill="#1a0a2e"/>
  <path d="M172 148 C166 122 169 92 186 68 C191 59 196 52 200 48 C204 52 209 59 214 68 C231 92 234 122 228 148 Z" fill="#2d1b4e"/>
  <!-- Center bell -->
  <ellipse cx="200" cy="44" rx="16" ry="16" fill="url(#goldMetal)" filter="url(#glow)"/>
  <ellipse cx="200" cy="44" rx="7" ry="7" fill="#fff8dc"/>

  <!-- Hat band diamonds -->
  <polygon points="200,134 210,142 200,150 190,142" fill="url(#goldMetal)"/>
  <polygon points="160,138 170,144 160,150 150,144" fill="#e74c3c"/>
  <polygon points="240,138 250,144 240,150 230,144" fill="#9b59b6"/>

  <!-- ═══ FACE ═══ -->
  <!-- Neck -->
  <rect x="183" y="290" width="34" height="30" rx="8" fill="url(#skinGrad)"/>

  <!-- Head -->
  <ellipse cx="200" cy="230" rx="72" ry="80" fill="url(#skinGrad)"/>

  <!-- Face shading -->
  <ellipse cx="170" cy="220" rx="20" ry="28" fill="#e8a070" opacity="0.15"/>
  <ellipse cx="230" cy="220" rx="20" ry="28" fill="#e8a070" opacity="0.15"/>

  <!-- Jester face paint — left purple triangle -->
  <path d="M148 200 C152 185 168 178 178 188 C172 195 165 205 158 215 Z" fill="#9b59b6" opacity="0.7"/>
  <!-- Right red triangle -->
  <path d="M252 200 C248 185 232 178 222 188 C228 195 235 205 242 215 Z" fill="#e74c3c" opacity="0.7"/>

  <!-- Eyebrows — arched dramatic -->
  <path d="M162 194 Q178 185 194 192" fill="none" stroke="#2c1810" stroke-width="4" stroke-linecap="round"/>
  <path d="M206 192 Q222 185 238 194" fill="none" stroke="#2c1810" stroke-width="4" stroke-linecap="round"/>

  <!-- Eyes whites -->
  <ellipse cx="178" cy="212" rx="18" ry="14" fill="white"/>
  <ellipse cx="222" cy="212" rx="18" ry="14" fill="white"/>

  <!-- Iris -->
  <circle cx="178" cy="212" r="10" fill="#2c6e8a"/>
  <circle cx="222" cy="212" r="10" fill="#2c6e8a"/>
  <!-- Pupil -->
  <circle cx="179" cy="213" r="6" fill="#0d0d0d"/>
  <circle cx="223" cy="213" r="6" fill="#0d0d0d"/>
  <!-- Catchlight -->
  <circle cx="182" cy="208" r="2.5" fill="white"/>
  <circle cx="226" cy="208" r="2.5" fill="white"/>
  <!-- Eye lashes -->
  <path d="M162 204 Q170 198 180 202" fill="none" stroke="#1a0a0a" stroke-width="1.5" opacity="0.6"/>
  <path d="M220 202 Q230 198 238 204" fill="none" stroke="#1a0a0a" stroke-width="1.5" opacity="0.6"/>

  <!-- Nose -->
  <path d="M196 224 Q200 238 204 224" fill="none" stroke="#c0845a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="193" cy="240" rx="7" ry="5" fill="#e09070" opacity="0.5"/>
  <ellipse cx="207" cy="240" rx="7" ry="5" fill="#e09070" opacity="0.5"/>

  <!-- Smile — wide grin -->
  <path d="M166 258 Q182 275 200 278 Q218 275 234 258" fill="none" stroke="#2c1810" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Teeth -->
  <path d="M171 261 Q185 272 200 274 Q215 272 229 261 Q215 268 200 270 Q185 268 171 261Z" fill="white"/>

  <!-- Cheek blush -->
  <ellipse cx="158" cy="252" rx="16" ry="10" fill="#e74c3c" opacity="0.25"/>
  <ellipse cx="242" cy="252" rx="16" ry="10" fill="#e74c3c" opacity="0.25"/>

  <!-- Collar / ruff -->
  <path d="M140 318 Q150 298 165 292 Q180 288 200 290 Q220 288 235 292 Q250 298 260 318 Q240 306 220 310 Q210 308 200 310 Q190 308 180 310 Q160 306 140 318Z" fill="url(#jesterRed)"/>
  <path d="M138 322 Q155 308 175 312 Q190 315 200 314 Q210 315 225 312 Q245 308 262 322 Q245 314 225 318 Q212 320 200 319 Q188 320 175 318 Q155 314 138 322Z" fill="url(#jesterPurple)"/>

  <!-- ═══ BODY ═══ -->
  <path d="M138 322 Q120 360 118 420 L282 420 Q280 360 262 322 Q240 340 200 342 Q160 340 138 322Z" fill="url(#jesterPurple)"/>
  <!-- Body diamond pattern -->
  <path d="M165 355 L200 335 L235 355 L200 375Z" fill="url(#jesterRed)" opacity="0.8"/>
  <path d="M148 390 L175 372 L200 390 L175 408Z" fill="url(#goldMetal)" opacity="0.6"/>
  <path d="M200 390 L225 372 L252 390 L225 408Z" fill="url(#goldMetal)" opacity="0.6"/>

  <!-- Arms -->
  <path d="M118 370 Q88 360 70 340 Q62 325 72 315 Q82 305 92 318 Q88 330 100 342 Q112 354 130 362Z" fill="url(#skinGrad)"/>
  <path d="M282 370 Q312 360 330 340 Q338 325 328 315 Q318 305 308 318 Q312 330 300 342 Q288 354 270 362Z" fill="url(#skinGrad)"/>

  <!-- Hands holding cards -->
  <!-- Left hand -->
  <ellipse cx="72" cy="318" rx="18" ry="14" fill="url(#skinGrad)"/>
  <!-- Right hand -->
  <ellipse cx="328" cy="318" rx="18" ry="14" fill="url(#skinGrad)"/>

  <!-- Small cards in hands -->
  <rect x="44" y="296" width="30" height="42" rx="4" fill="white" stroke="#d4a843" stroke-width="1.5" transform="rotate(-20 59 317)"/>
  <text x="46" y="314" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#e74c3c" transform="rotate(-20 59 317)">♥</text>
  <rect x="326" y="296" width="30" height="42" rx="4" fill="white" stroke="#d4a843" stroke-width="1.5" transform="rotate(20 341 317)"/>
  <text x="328" y="314" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#1a0a2e" transform="rotate(20 341 317)">♠</text>

  <!-- Legs -->
  <path d="M155 420 Q150 460 148 490 Q160 492 168 490 Q174 462 178 430Z" fill="url(#jesterRed)"/>
  <path d="M245 420 Q250 460 252 490 Q240 492 232 490 Q226 462 222 430Z" fill="url(#jesterPurple)"/>

  <!-- Shoes with bells -->
  <path d="M138 488 Q148 482 168 488 Q172 498 164 504 Q152 508 140 500 Z" fill="#1a0a2e"/>
  <ellipse cx="134" cy="498" rx="10" ry="10" fill="url(#goldMetal)" filter="url(#glow)"/>
  <ellipse cx="134" cy="498" rx="4" ry="4" fill="#fff8dc"/>
  <path d="M222 488 Q242 482 252 488 Q258 498 248 504 Q236 508 224 500 Z" fill="#1a0a2e"/>
  <ellipse cx="262" cy="498" rx="10" ry="10" fill="url(#goldMetal)" filter="url(#glow)"/>
  <ellipse cx="262" cy="498" rx="4" ry="4" fill="#fff8dc"/>

  <!-- ═══ NAME BANNER ═══ -->
  <rect x="100" y="518" width="200" height="26" rx="8" fill="#1a0a2e" opacity="0.85"/>
  <rect x="101" y="519" width="198" height="24" rx="7" fill="none" stroke="url(#goldMetal)" stroke-width="1.5"/>
  <text x="200" y="535" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="url(#goldMetal)" letter-spacing="4">DEFI</text>

  <!-- Stars decoration around name -->
  <text x="112" y="534" font-family="Georgia,serif" font-size="11" fill="#d4a843" opacity="0.8">✦</text>
  <text x="277" y="534" font-family="Georgia,serif" font-size="11" fill="#d4a843" opacity="0.8">✦</text>

</svg>
