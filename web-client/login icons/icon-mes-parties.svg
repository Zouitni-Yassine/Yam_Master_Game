<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <style>.g{fill:#C8A96E}.e{fill:none;stroke:#C8A96E;stroke-linecap:round;stroke-linejoin:round}</style>

