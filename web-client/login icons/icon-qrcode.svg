<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <style>.g{fill:#C8A96E}.e{fill:none;stroke:#C8A96E;stroke-width:1.5}</style>

  <!-- Outer frame top-left -->
  <rect class="e" x="2" y="2" width="14" height="14" rx="2"/>
  <rect class="g" x="5" y="5" width="8" height="8" rx="1"/>

  <!-- Outer frame top-right -->
  <rect class="e" x="24" y="2" width="14" height="14" rx="2"/>
  <rect class="g" x="27" y="5" width="8" height="8" rx="1"/>

  <!-- Outer frame bottom-left -->
  <rect class="e" x="2" y="24" width="14" height="14" rx="2"/>
  <rect class="g" x="5" y="27" width="8" height="8" rx="1"/>

  <!-- Data dots bottom-right area -->
  <rect class="g" x="24" y="24" width="4" height="4" rx="0.5"/>
  <rect class="g" x="30" y="24" width="4" height="4" rx="0.5"/>
  <rect class="g" x="34" y="24" width="4" height="4" rx="0.5"/>
  <rect class="g" x="24" y="30" width="4" height="4" rx="0.5"/>
  <rect class="g" x="30" y="30" width="4" height="4" rx="0.5"/>
  <rect class="g" x="24" y="34" width="4" height="4" rx="0.5"/>
  <rect class="g" x="34" y="34" width="4" height="4" rx="0.5"/>

  <!-- Center data dots -->
  <rect class="g" x="18" y="2" width="4" height="4" rx="0.5"/>
  <rect class="g" x="18" y="8" width="4" height="4" rx="0.5"/>
  <rect class="g" x="2" y="18" width="4" height="4" rx="0.5"/>
  <rect class="g" x="8" y="18" width="4" height="4" rx="0.5"/>
  <rect class="g" x="18" y="18" width="4" height="4" rx="0.5"/>
  <rect class="g" x="24" y="18" width="4" height="4" rx="0.5"/>
  <rect class="g" x="34" y="18" width="4" height="4" rx="0.5"/>
  <rect class="g" x="18" y="24" width="4" height="4" rx="0.5"/>
  <rect class="g" x="18" y="30" width="4" height="4" rx="0.5"/>
  <rect class="g" x="18" y="34" width="4" height="4" rx="0.5"/>
</svg>
